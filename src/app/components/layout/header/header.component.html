<header class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-zinc-200">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-20">
            <!-- Brand Logo & Name -->
            <div routerLink="/" class="flex items-center gap-2 cursor-pointer">
                <img src="assets/logo.png" alt="Conceição Lopes" class="h-12 w-auto object-contain" />
                <div class="hidden sm:flex flex-col">
                    <span class="text-xl font-serif font-bold text-primary leading-tight">Conceição Lopes</span>
                    <span class="text-xs tracking-[0.2em] uppercase text-accent font-medium">Advogada</span>
                </div>
            </div>

            <!-- Desktop Navigation -->
            <div class="hidden md:flex items-center space-x-8">
                <a routerLink="/" routerLinkActive="text-primary font-semibold"
                    [routerLinkActiveOptions]="{exact: true}" class="nav-link">
                    Início
                </a>
                <a routerLink="/sobre" routerLinkActive="text-primary font-semibold" class="nav-link">
                    Sobre
                </a>

                <!-- Áreas dropdown -->
                <div class="relative group">
                    <button class="nav-link flex items-center gap-1 py-2 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary/40 rounded"
                        aria-haspopup="true"
                        [attr.aria-expanded]="false">
                        Áreas
                        <lucide-icon [name]="ChevronDown"
                            class="w-3.5 h-3.5 transition-transform duration-200 group-hover:rotate-180 group-focus-within:rotate-180" aria-hidden="true" />
                    </button>

                    <!-- Dropdown panel -->
                    <div class="absolute top-full left-1/2 -translate-x-1/2 pt-2 invisible opacity-0 group-hover:visible group-hover:opacity-100 group-focus-within:visible group-focus-within:opacity-100 transition-all duration-200 pointer-events-none group-hover:pointer-events-auto group-focus-within:pointer-events-auto">
                        <div class="bg-white rounded-2xl shadow-2xl border border-zinc-100 p-3 w-64">
                            <a *ngFor="let area of areas"
                                [routerLink]="area.path"
                                class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-zinc-50 transition-colors group/item">
                                <div class="w-8 h-8 rounded-xl bg-secondary/10 flex items-center justify-center shrink-0 group-hover/item:bg-secondary/20 transition-colors">
                                    <lucide-icon [name]="area.icon" class="w-4 h-4 text-secondary" aria-hidden="true" />
                                </div>
                                <span class="text-sm font-medium text-zinc-700 group-hover/item:text-primary transition-colors">{{ area.label }}</span>
                            </a>
                            <div class="border-t border-zinc-100 mt-2 pt-2">
                                <a routerLink="/areas"
                                    class="flex items-center justify-center gap-1 px-3 py-2 rounded-xl text-xs font-semibold text-secondary hover:bg-secondary/5 transition-colors">
                                    Ver todas as áreas
                                    <lucide-icon [name]="ChevronDown" class="w-3 h-3 -rotate-90" aria-hidden="true" />
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <a routerLink="/agendamento" class="btn-primary relative overflow-hidden">
                    Agendar Consulta
                    <app-border-beam [duration]="8" [size]="100" />
                </a>
            </div>

            <!-- Mobile Menu Button -->
            <div class="md:hidden flex items-center">
                <button (click)="toggleMenu()"
                    class="text-zinc-600 p-2.5 rounded-lg hover:bg-zinc-100 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary/40"
                    [attr.aria-expanded]="isMenuOpen()"
                    aria-controls="mobile-nav"
                    aria-label="Toggle menu">
                    <lucide-icon [name]="isMenuOpen() ? X : Menu" class="w-6 h-6" aria-hidden="true" />
                </button>
            </div>
        </div>

        <!-- Mobile Navigation -->
        <div *ngIf="isMenuOpen()"
            id="mobile-nav"
            class="md:hidden py-4 border-t border-zinc-100 flex flex-col space-y-1 animate-in slide-in-from-top-2 duration-200">
            <a routerLink="/" (click)="closeMenu()" class="mobile-nav-link">Início</a>
            <a routerLink="/sobre" (click)="closeMenu()" class="mobile-nav-link">Sobre</a>

            <!-- Mobile areas toggle -->
            <button (click)="toggleAreas()"
                class="mobile-nav-link flex items-center justify-between w-full">
                <span>Áreas</span>
                <lucide-icon [name]="ChevronDown"
                    class="w-4 h-4 transition-transform duration-200"
                    [class.rotate-180]="isAreasOpen()" aria-hidden="true" />
            </button>

            <!-- Mobile areas sub-list -->
            <div *ngIf="isAreasOpen()" class="pl-4 flex flex-col space-y-1 border-l-2 border-secondary/20 ml-2 animate-in slide-in-from-top-1 duration-150">
                <a *ngFor="let area of areas"
                    [routerLink]="area.path"
                    (click)="closeMenu()"
                    class="flex items-center gap-2.5 px-2 py-2 rounded-lg text-sm text-zinc-600 hover:text-primary hover:bg-zinc-50 transition-colors">
                    <div class="w-6 h-6 rounded-lg bg-secondary/10 flex items-center justify-center shrink-0">
                        <lucide-icon [name]="area.icon" class="w-3.5 h-3.5 text-secondary" aria-hidden="true" />
                    </div>
                    {{ area.label }}
                </a>
                <a routerLink="/areas" (click)="closeMenu()"
                    class="px-2 py-2 text-xs font-semibold text-secondary hover:underline">
                    Ver todas →
                </a>
            </div>

            <a routerLink="/agendamento" (click)="closeMenu()"
                class="btn-primary w-full text-center relative overflow-hidden mt-2">
                Agendar Consulta
                <app-border-beam [duration]="8" [size]="100" />
            </a>
        </div>
    </nav>
</header>
