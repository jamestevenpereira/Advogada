<div [class]="cn(
    'group relative flex flex-col justify-between overflow-hidden rounded-3xl',
    'bg-white [box-shadow:0_0_0_1px_rgba(0,0,0,.03),0_2px_4px_rgba(0,0,0,.05),0_12px_24px_rgba(0,0,0,.05)]',
    'transform-gpu transition-all duration-300 hover:shadow-xl hover:-translate-y-1',
    class()
  )">
    <div class="relative flex flex-col p-8 z-10">
        <ng-content select="[icon-container]" />
        <h3 class="text-xl font-bold text-primary mt-4 mb-2">
            {{ title() }}
        </h3>
        <p class="text-zinc-500 text-sm leading-relaxed">
            {{ description() }}
        </p>
    </div>

    <!-- Overlay Effect -->
    <div
        class="pointer-events-none absolute inset-0 transform-gpu transition-all duration-300 group-hover:bg-black/[.03]">
    </div>

    <ng-content />
</div>
