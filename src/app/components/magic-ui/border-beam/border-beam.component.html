<div [style.--size]="size()" [style.--duration]="duration()" [style.--anchor]="anchor()"
    [style.--border-width]="borderWidth()" [style.--color-from]="colorFrom()" [style.--color-to]="colorTo()"
    [style.--delay]="delay()" [class]="cn(
    'pointer-events-none absolute inset-[0px] rounded-[inherit] [border:calc(var(--border-width)*1px)_solid_transparent]',
    '![mask-clip:padding-box,border-box] ![mask-composite:intersect] [mask-init:padding-box,border-box]',
    '[mask-image:linear-gradient(transparent,transparent),linear-gradient(#000,#000)]',
    'after:absolute after:aspect-square after:w-[calc(var(--size)*1px)] after:animate-border-beam after:[animation-delay:calc(var(--delay)*1s)] after:[background:linear-gradient(to_left,var(--color-from),var(--color-to),transparent)] after:[offset-anchor:calc(var(--anchor)*1%)_50%] after:[offset-path:rect(0_auto_auto_0_round_calc(var(--size)*1px))] shadow-sm'
  )"></div>
